name: Build and Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            archive_suffix: macos-aarch64
          - runner: ubuntu-latest
            archive_suffix: linux-x86_64
          - runner: ubuntu-24.04-arm
            archive_suffix: linux-aarch64
          - runner: windows-latest
            archive_suffix: windows-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Stub optional devtools dependency
        run: |
          mkdir -p node_modules/react-devtools-core
          echo '{"name":"react-devtools-core","main":"index.js"}' > node_modules/react-devtools-core/package.json
          echo 'export default {};' > node_modules/react-devtools-core/index.js

      - name: Compile standalone binary (unix)
        if: runner.os != 'Windows'
        run: bun build --compile --compile-autoload-package-json src/index.tsx --outfile dist/patui

      - name: Compile standalone binary (windows)
        if: runner.os == 'Windows'
        run: bun build --compile --compile-autoload-package-json src/index.tsx --outfile dist/patui.exe

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE_DIR="patui-${VERSION}-${{ matrix.archive_suffix }}"
          mkdir -p "${ARCHIVE_DIR}/node_modules/@img"
          cp dist/patui "${ARCHIVE_DIR}/"
          cp -r node_modules/@img/sharp-* "${ARCHIVE_DIR}/node_modules/@img/"
          tar czf "${ARCHIVE_DIR}.tar.gz" "${ARCHIVE_DIR}"
          echo "ARCHIVE=${ARCHIVE_DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE_DIR="patui-${VERSION}-${{ matrix.archive_suffix }}"
          mkdir -p "${ARCHIVE_DIR}/node_modules/@img"
          cp dist/patui.exe "${ARCHIVE_DIR}/"
          cp -r node_modules/@img/sharp-* "${ARCHIVE_DIR}/node_modules/@img/"
          7z a "${ARCHIVE_DIR}.zip" "${ARCHIVE_DIR}"
          echo "ARCHIVE=${ARCHIVE_DIR}.zip" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: patui-${{ matrix.archive_suffix }}
          path: ${{ env.ARCHIVE }}

  release:
    if: github.ref_type == 'tag'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
